services:
  wordpress:
    build:
      context: .
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-mariadb:3306}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-greta_learning}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-greta}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-change-me}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-greta_}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      WP_SITEURL: ${WP_SITEURL:-http://localhost:8080}
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_HOME', getenv( 'WP_HOME' ) );
        define( 'WP_SITEURL', getenv( 'WP_SITEURL' ) );
        define( 'FS_METHOD', 'direct' );
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-greta_learning}
      MARIADB_USER: ${WORDPRESS_DB_USER:-greta}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-change-me}
      MARIADB_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - mariadb-data:/var/lib/mysql

volumes:
  mariadb-data:
